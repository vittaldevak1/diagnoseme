<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagnoseMe AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0d0d14;
            --surface2: #13131f;
            --border: rgba(255,255,255,0.07);
            --accent: #00e5ff;
            --accent2: #7b5ea7;
            --accent3: #00ff9d;
            --text: #e8e8f0;
            --text-dim: #6b6b80;
            --danger: #ff4d6d;
            --glow: rgba(0, 229, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            cursor: default;
        }

        /* NEURAL NETWORK CANVAS */
        #neural-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.4;
        }

        /* SCREENS */
        .screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            align-items: center;
            justify-content: center;
        }
        .screen.active { display: flex; }

        /* ─── LOGIN SCREEN ─── */
        #login-screen {
            flex-direction: column;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 48px;
        }

        .logo-mark {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            position: relative;
        }

        .logo-pulse {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            position: absolute;
            animation: pulse-ring 2s ease-out infinite;
        }

        .logo-pulse:nth-child(2) { animation-delay: 0.6s; }
        .logo-pulse:nth-child(3) { animation-delay: 1.2s; }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .logo-core {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,229,255,0.3);
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text);
        }

        .brand-name span {
            color: var(--accent);
        }

        .brand-tag {
            font-size: 13px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
            font-weight: 300;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-sub {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 28px;
            font-weight: 300;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-label {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            color: var(--text);
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
        }

        input::placeholder { color: var(--text-dim); }

        select option { background: #1a1a2e; }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #33ecff;
            box-shadow: 0 0 20px rgba(0,229,255,0.4);
            transform: translateY(-1px);
        }

        .btn-primary:active { transform: translateY(0); }

        /* ─── REGISTER SCREEN ─── */
        #register-screen { animation: fadeUp 0.5s ease both; }

        .register-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 460px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent2), transparent);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* ─── CHAT SCREEN ─── */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        #chat-screen.active {
            display: flex;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: rgba(13,13,20,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 20;
            position: relative;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-dot {
            width: 8px;
            height: 8px;
            background: var(--accent3);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent3);
            animation: blink 2s ease infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header-title {
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 700;
        }

        .header-status {
            font-size: 12px;
            color: var(--accent3);
            font-weight: 300;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .btn-save {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            color: var(--text-dim);
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 32px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 860px;
            width: 100%;
            margin: 0 auto;
        }

        .chat-body::-webkit-scrollbar { width: 3px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* MESSAGE STYLES */
        .msg {
            display: flex;
            gap: 12px;
            animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
        }

        .ai-avatar {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #000;
            font-size: 12px;
        }

        .user-avatar {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 11px;
        }

        .msg-bubble {
            max-width: 68%;
            padding: 13px 17px;
            border-radius: 4px 16px 16px 16px;
            font-size: 14.5px;
            line-height: 1.65;
        }

        .msg.user .msg-bubble {
            border-radius: 16px 4px 16px 16px;
            background: var(--accent);
            color: #000;
            font-weight: 500;
        }

        .msg.ai .msg-bubble {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
        }

        /* TYPING INDICATOR */
        .typing-bubble {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: typing 1.2s ease infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* CHAT INPUT */
        .chat-footer {
            padding: 16px 28px 20px;
            background: rgba(13,13,20,0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            max-width: 860px;
            width: 100%;
            margin: 0 auto;
        }

        .input-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.06);
        }

        .input-bar input {
            background: transparent;
            border: none;
            padding: 8px 0;
            font-size: 15px;
            flex: 1;
            box-shadow: none;
        }

        .input-bar input:focus { box-shadow: none; border: none; }

        .btn-send {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background: #33ecff;
            box-shadow: 0 0 16px rgba(0,229,255,0.4);
        }

        .btn-send svg {
            width: 18px;
            height: 18px;
            fill: #000;
        }

        /* WELCOME MESSAGE */
        .welcome-banner {
            background: linear-gradient(135deg, rgba(0,229,255,0.05), rgba(123,94,167,0.05));
            border: 1px solid rgba(0,229,255,0.15);
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            animation: fadeUp 0.5s ease both;
        }

        .welcome-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .welcome-text h3 {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .welcome-text p {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 300;
        }

        /* HISTORY ITEMS */
        .history-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .history-date {
            color: var(--accent);
            font-size: 11px;
            white-space: nowrap;
            margin-top: 1px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface2);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 14px;
            color: var(--accent);
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .login-card, .register-card { width: 92vw; padding: 28px 20px; }
            .form-row { grid-template-columns: 1fr; }
            .msg-bubble { max-width: 85%; }
            .chat-body { padding: 20px 16px; }
            .chat-footer { padding: 12px 16px 16px; }
            .chat-header { padding: 12px 16px; }
        }

        /* SCROLLBAR for whole page */
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    </style>
</head>
<body>

<canvas id="neural-canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- ─── LOGIN SCREEN ─── -->
<div id="login-screen" class="screen active">
    <div class="login-container">
        <div class="brand">
            <div class="logo-mark">
                <div class="logo-pulse"></div>
                <div class="logo-pulse"></div>
                <div class="logo-pulse"></div>
                <div class="logo-core"></div>
            </div>
            <div class="brand-name">Diagnose<span>Me</span></div>
            <div class="brand-tag">AI Medical Assistant</div>
        </div>

        <div class="login-card">
            <div class="card-title">Welcome back</div>
            <div class="card-sub">Enter your name to get started</div>

            <div class="input-group">
                <label class="input-label">Your Name</label>
                <input type="text" id="name-input" placeholder="e.g. Dhevesh" autocomplete="off" />
            </div>

            <button class="btn-primary" onclick="handleLogin()">Continue →</button>
        </div>
    </div>
</div>

<!-- ─── REGISTER SCREEN ─── -->
<div id="register-screen" class="screen">
    <div class="register-card">
        <div class="card-title">Set up your profile</div>
        <div class="card-sub">This helps us give you a more accurate diagnosis</div>

        <div class="form-row">
            <div class="input-group">
                <label class="input-label">Age</label>
                <input type="number" id="age-input" placeholder="18" min="1" max="120" />
            </div>
            <div class="input-group">
                <label class="input-label">Gender</label>
                <select id="gender-input">
                    <option value="">Select</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Known Allergies</label>
            <input type="text" id="allergies-input" placeholder="Penicillin, peanuts... or none" />
        </div>

        <div class="input-group">
            <label class="input-label">Existing Conditions</label>
            <input type="text" id="conditions-input" placeholder="Diabetes, asthma... or none" />
        </div>

        <div class="input-group">
            <label class="input-label">Current Medications</label>
            <input type="text" id="medications-input" placeholder="Metformin, inhaler... or none" />
        </div>

        <button class="btn-primary" onclick="handleRegister()">Save & Start →</button>
    </div>
</div>

<!-- ─── CHAT SCREEN ─── -->
<div id="chat-screen" class="screen">
    <div class="chat-header">
        <div class="header-brand">
            <div class="header-dot"></div>
            <div>
                <div class="header-title">DiagnoseMe AI</div>
                <div class="header-status">Online · Ready to help</div>
            </div>
        </div>
        <div class="header-right">
            <div class="user-chip" id="user-chip">—</div>
            <button class="btn-save" onclick="saveSession()">Save Session</button>
        </div>
    </div>

    <div class="chat-body" id="chat-body"></div>

    <div class="chat-footer">
        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="Describe your symptoms..." onkeypress="handleKey(event)" autocomplete="off" />
            <button class="btn-send" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
// ─── NEURAL NETWORK ANIMATION ───
const canvas = document.getElementById('neural-canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const nodes = [];
const NODE_COUNT = 60;

for (let i = 0; i < NODE_COUNT; i++) {
    nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 2 + 1,
        pulse: Math.random() * Math.PI * 2
    });
}

function drawNeural() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        n.pulse += 0.02;

        if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
        if (n.y < 0 || n.y > canvas.height) n.vy *= -1;

        const glow = Math.sin(n.pulse) * 0.5 + 0.5;

        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r + glow, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 229, 255, ${0.3 + glow * 0.4})`;
        ctx.fill();
    });

    for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 140) {
                const alpha = (1 - dist / 140) * 0.25;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(0, 229, 255, ${alpha})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(drawNeural);
}

drawNeural();

// ─── APP LOGIC ───
let userName = '';

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

async function handleLogin() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) return showToast('Please enter your name');
    if (!/^[a-zA-Z ]+$/.test(name)) return showToast('Name should only contain letters');

    const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
    });
    const data = await res.json();
    userName = data.name;

    if (data.status === 'existing') {
        document.getElementById('user-chip').textContent = userName;
        showScreen('chat-screen');
        initChat(data.past);
    } else {
        showScreen('register-screen');
    }
}

function initChat(past) {
    const body = document.getElementById('chat-body');
    body.innerHTML = '';

    const banner = document.createElement('div');
    banner.className = 'welcome-banner';
    banner.innerHTML = `
        <div class="welcome-icon">🏥</div>
        <div class="welcome-text">
            <h3>Hey ${userName}! Good to see you.</h3>
            <p>I'm your AI medical assistant. Describe what you're feeling and I'll help you figure it out.</p>
        </div>
    `;
    body.appendChild(banner);

    if (past && past.length > 0) {
        past.forEach(p => {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span class="history-date">📋 ${p.date}</span><span>${p.summary}</span>`;
            body.appendChild(item);
        });
    }

    addMessage('ai', "What's going on today?");
}

async function handleRegister() {
    const age = document.getElementById('age-input').value;
    const gender = document.getElementById('gender-input').value;
    const allergies = document.getElementById('allergies-input').value.trim() || 'none';
    const conditions = document.getElementById('conditions-input').value.trim() || 'none';
    const medications = document.getElementById('medications-input').value.trim() || 'none';
    const name = document.getElementById('name-input').value.trim();

    if (!age || !gender) return showToast('Please fill in age and gender');
    if (parseInt(age) < 1 || parseInt(age) > 120) return showToast('Please enter a valid age');

    await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, age, gender, allergies, conditions, medications })
    });

    document.getElementById('user-chip').textContent = name;
    userName = name;
    showScreen('chat-screen');
    initChat([]);
}

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;
    input.value = '';

    addMessage('user', message);
    showTyping();

    const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
    });
    const data = await res.json();

    removeTyping();
    addMessage('ai', data.reply);
}

async function saveSession() {
    const res = await fetch('/save', { method: 'POST' });
    const data = await res.json();
    showToast('Session saved ✓');
}

function addMessage(type, text) {
    const body = document.getElementById('chat-body');
    const msg = document.createElement('div');
    msg.className = `msg ${type}`;

    const avatar = document.createElement('div');
    avatar.className = `msg-avatar ${type === 'ai' ? 'ai-avatar' : 'user-avatar'}`;
    avatar.textContent = type === 'ai' ? 'AI' : (userName ? userName[0].toUpperCase() : 'U');

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    body.appendChild(msg);
    body.scrollTop = body.scrollHeight;
}

function showTyping() {
    const body = document.getElementById('chat-body');
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar ai-avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    body.appendChild(msg);
    body.scrollTop = body.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
}

function handleKey(e) {
    if (e.key === 'Enter') sendMessage();
}

// Enter on login
document.getElementById('name-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
